<!DOCTYPE html>
<html lang="en" data-theme="mint">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — command not found</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3Crect%20width='64'%20height='64'%20rx='12'%20fill='%230a0e14'/%3E%3Ctext%20x='10'%20y='42'%20font-family='monospace'%20font-size='30'%20font-weight='bold'%20fill='%2322d3ae'%3E%26gt;_%3C/text%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    body {
      background: #0a0e14;
      color: #e6e6e6;
      font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
      font-size: 15px;
      line-height: 1.8;
      display: grid;
      place-items: center;
      min-height: 100dvh;
      margin: 0;
    }
    .box { padding: 24px; }
    .user { color: #22d3ae; font-weight: 700; }
    .path { color: #7aa2f7; font-weight: 700; }
    .dim { color: #8b94a7; }
    .err { color: #f26d78; }
    a { color: #22d3ae; }
  </style>
</head>
<body>
  <div class="box">
    <div><span class="user">rudra@portfolio</span><span class="dim">:</span><span class="path">~</span><span class="dim">$</span> cd <span class="err">this-page</span></div>
    <div>cd: no such file or directory <span class="dim">(404)</span></div>
    <div class="dim">&nbsp;</div>
    <div><span class="user">rudra@portfolio</span><span class="dim">:</span><span class="path">~</span><span class="dim">$</span> <a href="./">cd ~</a> <span class="dim"># take me home</span></div>
  </div>
</body>
</html>
